name: Build iOS IPA (unsigned)

# Builds the app + widgets on a macOS runner and publishes an UNSIGNED .ipa.
# An unsigned IPA can be installed on a real iPhone/iPod with a sideloading
# tool (Sideloadly / AltStore with a free Apple ID, or TrollStore on
# supported iOS versions). It does NOT require a paid Apple Developer account.

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'ShabbatApp/**'
      - 'ShabbatWidgets/**'
      - 'ShabbatApp.xcodeproj/**'
      - '.github/workflows/ios-build.yml'

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Build app and widgets (device, no code signing)
        run: |
          set -o pipefail
          # Build the widget extension first
          xcodebuild \
            -project ShabbatApp.xcodeproj \
            -scheme ShabbatWidgetsExtension \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_ENTITLEMENTS="" \
            build
          # Then build the main app (which will embed the widgets)
          xcodebuild \
            -project ShabbatApp.xcodeproj \
            -scheme ShabbatApp \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_ENTITLEMENTS="" \
            build

      - name: Verify and embed widget extension
        run: |
          set -e
          APP="build/Build/Products/Release-iphoneos/ShabbatApp.app"
          APPEX="build/Build/Products/Release-iphoneos/ShabbatWidgetsExtension.appex"
          PLUGINS="$APP/PlugIns"

          if [ ! -d "$APP" ]; then
            echo "App not found at $APP"
            find build/Build/Products -maxdepth 3 -name '*.app' -o -name '*.appex'
            exit 1
          fi

          # Check if widget extension exists
          if [ -d "$APPEX" ]; then
            echo "Found widget extension at $APPEX"
            mkdir -p "$PLUGINS"
            # Copy widget extension into PlugIns directory if not already there
            if [ ! -d "$PLUGINS/ShabbatWidgetsExtension.appex" ]; then
              echo "Embedding widget extension into app bundle..."
              cp -R "$APPEX" "$PLUGINS/"
              echo "✓ Widget extension embedded"
            else
              echo "✓ Widget extension already embedded"
            fi
            ls -la "$PLUGINS/"
          else
            echo "Warning: Widget extension not found at $APPEX"
            echo "Searching for .appex files..."
            find build/Build/Products -name "*.appex"
          fi

      - name: Package unsigned IPA
        run: |
          set -e
          APP="build/Build/Products/Release-iphoneos/ShabbatApp.app"
          if [ ! -d "$APP" ]; then
            echo "App not found at $APP"; find build/Build/Products -maxdepth 3 -name '*.app'; exit 1
          fi

          echo "Contents of app bundle:"
          ls -la "$APP/"

          if [ -d "$APP/PlugIns" ]; then
            echo "Contents of PlugIns:"
            ls -la "$APP/PlugIns/"
          fi

          rm -rf Payload ShabbatApp-unsigned.ipa
          mkdir -p Payload
          cp -R "$APP" Payload/
          zip -qry ShabbatApp-unsigned.ipa Payload
          ls -lh ShabbatApp-unsigned.ipa

      - name: Upload IPA as build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ShabbatApp-unsigned-ipa
          path: ShabbatApp-unsigned.ipa
          if-no-files-found: error

      - name: Publish IPA to a GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ios-latest
          name: Shabbat — iOS (unsigned IPA)
          body: |
            Unsigned build of the Shabbat app (iOS 15+), produced automatically by CI.

            How to install on an iPhone/iPod (no paid Apple account needed):
            - Sideloadly (Windows/Mac) or AltStore — signs the IPA with your own
              free Apple ID and installs it (re-sign every 7 days).
            - TrollStore — permanent install on supported iOS versions.

            Note: home-screen widgets share data with the app via an App Group,
            which free re-signing may strip; the main app works fully either way.
          files: ShabbatApp-unsigned.ipa
